{% extends "base.html" %}

{% block title %}品牌一覽 | {{ shop_name }}{% endblock %}

{% block content %}
<div class="container py-4">
    <h2 class="mb-4 text-center">所有品牌</h2>
    <div class="row g-3">
        {% for brand in brands %}
        <div class="col-6 col-md-4 col-lg-3">
            <a href="{{ brand.get_absolute_url }}" class="text-decoration-none">
                <div class="card text-center p-4 h-100 tyre-card">
                    {% if brand.logo %}
                    <img src="{{ brand.logo.url }}" alt="{{ brand.name }}" style="max-height: 60px;" class="mx-auto">
                    {% else %}
                    <h4 class="text-dark mt-3">{{ brand.name }}</h4>
                    {% endif %}
                    <p class="text-muted small mt-2">{{ brand.tyres.count }} 款輪胎</p>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}

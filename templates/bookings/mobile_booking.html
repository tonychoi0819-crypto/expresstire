{% extends "base.html" %}
{% block title %}上門安裝 | {{ shop_name }}{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <h2 class="mb-4 text-center"><i class="bi bi-truck"></i> 上門安裝服務</h2>
            <div class="alert alert-info">
                <i class="bi bi-info-circle"></i> 我們將派專業安裝車到您指定的地點。服務範圍：全香港九新界。
            </div>
            <form method="POST">
                {% csrf_token %}
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="row g-2">
                            <div class="col-md-6"><label class="form-label">姓名</label><input type="text" name="name" class="form-control" required></div>
                            <div class="col-md-6"><label class="form-label">電話</label><input type="tel" name="phone" class="form-control" required></div>
                            <div class="col-md-6"><label class="form-label">Email</label><input type="email" name="email" class="form-control"></div>
                            <div class="col-md-6"><label class="form-label">日期</label><input type="date" name="date" class="form-control" required></div>
                            <div class="col-12"><label class="form-label">上門地址 *</label><textarea name="address" class="form-control" rows="2" placeholder="請提供詳細地址及停車場樓層" required></textarea></div>
                            <div class="col-md-6"><label class="form-label">時段</label>
                                <select name="time_slot" class="form-select">
                                    <option value="08-10">8:00-10:00 AM</option>
                                    <option value="10-12">10:00-12:00 PM</option>
                                    <option value="12-14">12:00-2:00 PM</option>
                                    <option value="14-16">2:00-4:00 PM</option>
                                    <option value="16-18">4:00-6:00 PM</option>
                                </select>
                            </div>
                            <div class="col-md-6"><label class="form-label">輪胎資料</label><input type="text" name="tyre_details" class="form-control" placeholder="e.g. Michelin PS5 225/45R17 x4"></div>
                            <div class="col-12"><label class="form-label">備註</label><textarea name="notes" class="form-control" rows="2"></textarea></div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-brand w-100 py-2 fw-bold">提交申請</button>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
